spring:
  config:
    activate:
      on-profile: dev
  jpa:
    hibernate:
      ddl-auto: create
eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone:
        http://${EUREKA_ID}:${EUREKA_PASSWORD}@localhost:8761/eureka
logging:
  level:
    com.woobeee.blog: info
